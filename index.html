<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <h1>To-do List</h1>
    <h3>BY BRGY PITTLAND</h3>
    <div class="wrapper">
      <form>
        <input
          id="todo-input"
          type="text"
          placeholder="Enter a task"
          autocomplete="off"
        />
        <button id="add-button">ADD</button>
      </form>

      <div class="footer-controls">
        <span id="selection-toggle">Select</span>
        <span id="delete-all-button" style="display: none"
          >Delete All</span
        >
      </div>
      <div id="empty-state">No tasks added yet</div>
      <ul id="todo-list">
        <li class="todo">
          <input type="checkbox" id="todo-1" />
          <label class="custom-checkbox" for="todo-1">
            <svg
              fill="transparent"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z" />
            </svg>
          </label>
          <label for="todo-1" class="todo-text">
            webdev project with html, css and js
          </label>
          <button class="edit-button">
            <svg
              fill="var(--secondary-color)"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path d="M200-200h57l391-391-57-57-391
              391v57Zm-8080v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55
              56q12 1117.5 26t5.5 30q0 16-5.5
              30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57
              57-29-28Z""")/>>
            </svg>
          </button>
          <button class="delete-button">
            <svg
              fill="var(--secondary-color)"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path
                d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"
              />
            </svg>
          </button>
        </li>

        <li class="todo">
          <input type="checkbox" id="todo-2" />
          <label class="custom-checkbox" for="todo-2">
            <svg
              fill="transparent"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z" />
            </svg>
          </label>
          <label for="todo-2" class="todo-text">
            webdev project with html, css and js
          </label>
          <button class="edit-button">
            <svg
              fill="var(--secondary-color)"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path d="M200-200h57l391-391-57-57-391 391v57Zm-80
              80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11
              17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56
              56Zm-141 85-28-29 57 57-29-28Z""")/>>
            </svg>
          </button>
          <button class="delete-button">
            <svg
              fill="var(--secondary-color)"
              xmlns="http://www.w3.org/2000/svg"
              height="24"
              viewBox="0 -960 960 960"
              width="24"
            >
              <path
                d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"
              />
            </svg>
          </button>
        </li>
      </ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
